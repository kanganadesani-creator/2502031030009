<!DOCTYPE html>
<html>
<head>
<title>Signup Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

.container{
    width: 350px;
    margin: 100px auto;
    padding: 25px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 10px gray;
}

h2{
    text-align: center;
}

input{
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
}

button{
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 4px;
    cursor: pointer;
}

button:hover{
    background: #45a049;
}
</style>

</head>

<body>
    

<div class="container">
<h2>Signup</h2>

<form>
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<input type="password" placeholder="Confirm Password" required>

<button type="submit">Sign Up</button>
</form>

</div>

</body>
</html>
